<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid 03</title>
    <style>
        div.container {
            border: 3px solid blue ;
            display: grid;
           grid-template-rows: repeat(3, 80px);
           grid-template-columns: repeat(3, 120px);/*foder ser feito com fração 1fr amsi com uma só se almeta as colunas ou usando %*/
           grid-auto-flow: row;
           grid-auto-rows: 80px; /*E para toda vez que for griado uma nova linha*/
           grid-auto-columns: 120;
           gap: 10px;
           place-items: normal normal;
           place-content: normal normal;
        }
        div.item {
            border: 3px solid red;
            padding: 5px;
        }
    </style>
</head>
<body>
     <div class="container">
    <div class="item">A</div> 
   <div class="item">B</div>
   <div class="item">C</div>
   <div class="item">D</div>
   <div class="item">E</div>
   <div class="item">F</div>
   <div class="item">G</div>
   <div class="item">H</div>
   <div class="item">I</div>
   <div class="item">J</div>
   </div>
    
</body>
</html>
